<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ClinicCare - Medical Appointment Booking</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🏥</text></svg>">
</head>

<body>
    
    <!-- HOME PAGE - Hero Section -->
    <div id="homePage">
        <div class="container">
            <div class="logo-section">
                <h1 class="logo">Clinic<span>Care</span></h1>
                <div class="hospital-icon">🏥</div>
            </div>
            <p class="tagline">Book your medical appointments online<br><span>Fast • Secure • Reliable</span></p>
            <button class="hero-btn" onclick="goToBooking()">
                <span>📅 Book Appointment</span>
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none">
                    <path d="M5 12h14M12 5l7 7-7 7" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                </svg>
            </button>
        </div>
    </div>

    <!-- BOOKING FORM -->
    <div id="bookingPage" class="hidden">
        <div class="container">
            <div class="page-header">
                <h2>Book Appointment</h2>
            </div>

            <!-- Patient Info -->
            <div class="form-section">
                <h3>👤 Patient Information</h3>
                
                <div class="form-group">
                    <label>Full Name *</label>
                    <input type="text" id="fullName" placeholder="Enter full name" required>
                </div>

                <div class="form-row">
                    <div class="form-group">
                        <label>Birthdate</label>
                        <input type="date" id="birthdate">
                    </div>
                    <div class="form-group">
                        <label>Age</label>
                        <input type="text" id="age" readonly placeholder="Auto-calculated">
                    </div>
                </div>

                <div class="form-row">
                    <div class="form-group">
                        <label>Gender</label>
                        <select id="gender">
                            <option value="">Select Gender</option>
                            <option>Male</option>
                            <option>Female</option>
                            <option>Other</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label>Contact *</label>
                        <input type="tel" id="contactInfo" placeholder="Phone or Email">
                    </div>
                </div>

                <div class="form-group">
                    <label>Disease</label>
                    <input type="text" id="disease" placeholder="Describe your symptoms">
                </div>
            </div>

            <!-- Medical Info -->
            <div class="form-section">
                <h3>🩺 Medical Information</h3>

                <div class="form-group">
                      <label>Allergies</label>
                        <input type="text" id="allergies" placeholder="Any allergies">
                </div>

                <div class="form-row">
                    <div class="form-group">
                        <label>Current Medications</label>
                    <input type="text" id="medications" placeholder="List medications"> 
                    </div>
                     <div class="form-group">
                        <label>History</label>
                    <input type="text" id="history" placeholder="List history"> 
                    </div>
                </div>

                
            </div>

            <!-- Appointment Details -->
            <div class="form-section">
                <h3>📅 Appointment Details</h3>
                
                <div class="form-group">
                    <label>Date & Time *</label>
                    <input type="datetime-local" id="appointmentDateTime" required>
                </div>

                <div class="form-group">
                    <label>Doctor *</label>
                   <select id="doctorSelect">
                     <option>-- Select Doctor --</option>
                    </select>
                </div>
            </div>


            <!-- Payment -->
            <div class="form-section">
                <h3>💳 Payment Method</h3>
                
                <div class="form-group">
                    <select id="paymentMethod">
                        <option>Cash</option>
                        <option>Credit Card</option>
                        <option>Debit Card</option>
                        <option>Insurance</option>
                    </select>
                </div>

                  <h3>Status</h3>
                <div class="form-group">
                    <select id="status">
                        <option>Scheduled</option>
                        <option>Completed</option>
                        <option>Cancelled</option>
                    </select>
                </div>
            </div>

            <!-- Action Buttons -->
            <div class="form-actions">
                <button class="btn-secondary" onclick="goHome()">
                    <span>← Back</span>
                </button>
                <button class="btn-primary" onclick="confirmBooking()">
                    ✅ Confirm Booking
                </button>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
